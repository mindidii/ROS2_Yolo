yolo_detector_eo_node:
  ros__parameters:
    model_path: "/ros2_ws/src/yolo_detector_pkg/model/yolo11s.pt"
    image_topic: "/video/eo/preprocessed"
    frame_info_topic: "/video/eo/preprocessed/frame_info"
    conf_threshold: 0.2
    stale_track_frames: 20
    drone_hold_min_conf: 0.2
    drone_hold_missing_frames: 10
    hold_class_ids: "1"
    smooth_alpha: 0.35
    drone_max_height_ratio: 0.80
    drone_max_width_ratio: 0.80
    drone_max_area_ratio: 0.80
    class_min_area_ratios: "0:0.0002,1:0.00002"
    class_conf_thresholds: "0:0.2,1:0.25"
    allowed_class_ids: "0,1"
    class_filter: ""
    input_width: 640
    input_height: 640
    enabled: true
    inference_period_sec: 0.05
    inference_frame_stride: 1
    sync_queue_size: 30
    process_latest_only: true
    detection_topic: "/detections/eo"
    driver_detection_topic: "/driver/detection"
    publish_driver_detection: false
    driver_frame_size_topic: "/driver/eo/frame_size"
    detection_hold_sec: 1.0
    track_max_missed_frames: 10
    track_max_center_distance_px: 200.0
    status_topic: "/yolo/eo/status"
    enable_service: "/yolo/eo/enable"
    threshold_service: "/yolo/eo/set_threshold"
